<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyLibraryApp</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: #f8fafc;
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    
    /* Decorative elements */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
    }
    .shape1 {
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: #8b5cf6;
    }
    .shape2 {
      bottom: -150px;
      right: -50px;
      width: 500px;
      height: 500px;
      background: #3b82f6;
    }

    #Main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
    }

    .hero {
      background: rgba(30, 41, 59, 0.4);
      padding: 3rem;
      border-radius: 1.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .title {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: rgba(255,255,255,0.2);
      transform: rotate(45deg) translateY(-100%);
      transition: transform 0.5s;
    }

    .btn-primary:hover::after {
      transform: rotate(45deg) translateY(100%);
    }

    .btn-primary:hover {
      box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.5);
      transform: translateY(-2px);
    }
    
    .btn-primary:active {
      transform: scale(0.95);
      box-shadow: 0 5px 10px -2px rgba(59, 130, 246, 0.4);
    }

    .count-display {
      font-size: 5rem;
      font-weight: 800;
      color: #f1f5f9;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
      line-height: 1;
      margin: 1rem 0;
      position: relative;
    }
    
    .subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body x-data="app()">
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  
  <div id="Main">
    <div class="hero">
      <span class="subtitle">Interactive</span>
      <h1 class="title">Welcome to ProXPL UI</h1>
      
      <div class="count-display" x-text="count"></div>
      
      <button class="btn-primary" @click="increment()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>Increment</span>
      </button>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
